<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16212E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fiches Commerçants — Bandol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B1B0E;
    --harbor:#E8821C;
    --harbor-dark:#C96A12;
    --paper:#FCF1DF;
    --paper-2:#F6DDB6;
    --terracotta:#C0392B;
    --olive:#B5651D;
    --plum:#8B5E3C;
    --ochre:#C9971C;
    --steel:#A85C2E;
    --line:#EAD2A6;
    --ash:#8A6D52;
    --good:#2E7D4F;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:90px;
  }
  h1,h2,h3,.serif{font-family:'Inter',system-ui,sans-serif; font-weight:700; letter-spacing:-.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:var(--paper);
    color:var(--ink);
    padding:16px 16px 12px;
    border-bottom:1px solid var(--line);
  }
  header .row{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
  .header-id{display:flex; align-items:center; gap:12px;}
  .avatar{
    width:46px; height:46px; border-radius:13px; background:var(--paper-2);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
    color:var(--harbor-dark);
  }
  header h1{font-size:18px; margin:0; font-weight:800; letter-spacing:-.01em; color:var(--ink);}
  header .sub{
    font-size:10.5px; font-family:'IBM Plex Mono'; text-transform:uppercase; letter-spacing:.6px;
    color:var(--ash); margin-top:3px;
  }
  .count-badge{
    font-family:'Inter'; font-weight:800; font-size:13px; color:#fff;
    background:linear-gradient(180deg, var(--harbor), var(--harbor-dark));
    border-radius:20px; padding:5px 13px; white-space:nowrap; flex:0 0 auto;
  }
  .icon-btn{
    background:#fff; border:1px solid var(--line); color:var(--ink);
    border-radius:9px; padding:8px 12px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Inter';
    margin-top:12px;
  }
  .icon-btn:active{background:var(--paper-2);}

  /* ---------- Controls ---------- */
  .controls{padding:14px 16px 4px;}
  .segmented{
    display:flex; gap:8px; border-bottom:2px solid var(--line); padding-bottom:10px;
  }
  .segmented button{
    border:0; padding:9px 18px; border-radius:20px;
    font-family:'Inter'; font-size:13px; font-weight:700; color:var(--ash); cursor:pointer;
    background:var(--paper-2);
  }
  .segmented button.active{
    background:linear-gradient(180deg, var(--harbor), var(--harbor-dark)); color:#fff;
  }
  .searchwrap{margin-top:10px; position:relative;}
  .searchwrap input{
    width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--line);
    background:#fff; font-family:'Inter'; font-size:14.5px; color:var(--ink);
  }
  .searchwrap input:focus{outline:2px solid var(--harbor); outline-offset:1px;}

  /* ---------- Lists ---------- */
  main{padding:6px 16px 16px;}
  .items{margin-top:8px; display:flex; flex-direction:column; gap:8px;}

  .section{margin-top:20px;}
  .section:first-child{margin-top:4px;}
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:0 2px 8px;
  }
  .section-title{font-family:'Inter'; font-weight:800; font-size:14.5px; color:var(--ink); letter-spacing:-.01em;}
  .section-count{font-family:'IBM Plex Mono'; font-size:11px; color:var(--ash);}

  .empty{
    text-align:center; padding:40px 20px; color:var(--ash);
  }
  .empty .big{font-size:32px; margin-bottom:8px;}

  /* ---------- Tile grid ---------- */
  .tile-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .tile{
    position:relative; border:none; border-radius:16px; padding:18px 12px 14px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;
    box-shadow:0 4px 10px rgba(43,27,14,.22);
  }
  .tile:active{transform:scale(.97);}
  .tile-icon{display:flex; align-items:center; justify-content:center; margin-bottom:2px;}
  .tile-label{color:#fff; font-weight:800; font-size:13.5px; line-height:1.25; font-family:'Inter';}
  .tile-sub{color:rgba(255,255,255,.85); font-weight:500; font-size:10.5px; line-height:1.3;}
  .tile-count{
    position:absolute; top:10px; right:10px; background:rgba(255,255,255,.28); color:#fff;
    font-family:'IBM Plex Mono'; font-size:10.5px; font-weight:700; border-radius:20px; padding:2px 8px;
  }

  /* ---------- FAB ---------- */
  .fab{
    position:fixed; right:18px; bottom:22px; z-index:25;
    width:54px; height:54px; border-radius:50%;
    background:linear-gradient(180deg, var(--harbor), var(--harbor-dark)); color:#fff; border:none;
    font-size:24px; box-shadow:0 4px 14px rgba(232,130,28,.45);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .fab:active{transform:scale(.95);}

  /* ---------- Overlay (fiche + add) ---------- */
  .overlay{
    position:fixed; inset:0; background:var(--paper); z-index:50;
    transform:translateY(100%); transition:transform .22s ease;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .overlay.open{transform:translateY(0);}
  .overlay-head{
    background:var(--ink); color:var(--paper); padding:16px;
    display:flex; align-items:center; gap:12px; flex:0 0 auto;
  }
  .overlay-head button.back{background:none; border:none; color:var(--paper); font-size:20px; cursor:pointer; padding:0 4px;}
  .overlay-head .htitle{font-family:'Inter'; font-weight:700; font-size:16px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .overlay-body{flex:1; overflow-y:auto; padding:18px 16px 40px;}

  /* Fiche card — bandeau latéral de couleur, sobre */
  .fiche-card{
    background:#fff; border:1px solid var(--line); border-left:4px solid var(--tagcolor, var(--harbor));
    border-radius:8px; padding:18px; position:relative; margin-bottom:18px;
  }
  .fiche-card .perf{
    border-top:1px solid var(--line); margin:16px 0;
  }
  .fiche-nom{font-size:19px; font-weight:700; line-height:1.25; margin:2px 0 6px;}
  .fiche-tag{
    display:inline-flex; align-items:center; gap:5px; font-size:11px; font-family:'IBM Plex Mono'; letter-spacing:.3px;
    padding:3px 9px; border-radius:5px; color:#fff; margin-bottom:6px;
  }
  .fiche-addr{font-size:13.5px; color:var(--ash);}

  .field{margin-bottom:14px;}
  .field label{
    display:block; font-size:11.5px; font-family:'IBM Plex Mono'; color:var(--ash);
    text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px;
  }
  .field input, .field textarea, .field select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    font-family:'Inter'; font-size:14.5px; background:var(--paper-2); color:var(--ink);
  }
  .field textarea{min-height:72px; resize:vertical; font-family:'Inter';}
  .field input:focus, .field textarea:focus, .field select:focus{outline:2px solid var(--harbor); outline-offset:1px; background:#fff;}

  .saved-hint{font-size:11.5px; color:var(--good); display:flex; align-items:center; gap:5px; margin-top:-4px; margin-bottom:14px; min-height:14px;}

  .ca-table{width:100%; border-collapse:collapse; margin-bottom:10px;}
  .ca-table th{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; color:var(--ash); text-align:left; padding:4px 6px; border-bottom:1px solid var(--line);}
  .ca-row td{padding:5px 4px;}
  .ca-row input{padding:7px 8px; font-size:13.5px;}
  .ca-row .rm{background:none; border:none; color:var(--terracotta); font-size:18px; cursor:pointer; padding:0 6px;}
  .add-ca-btn{
    width:100%; padding:9px; border:1px dashed var(--line); border-radius:8px; background:transparent;
    color:var(--harbor); font-family:'Inter'; font-size:13px; font-weight:600; cursor:pointer; margin-top:4px;
  }

  .btn-row{display:flex; gap:10px; margin-top:6px;}
  .btn{
    flex:1; padding:13px; border-radius:24px; border:none; font-family:'Inter'; font-weight:700;
    font-size:14px; cursor:pointer; text-align:center;
  }
  .btn-print{background:linear-gradient(180deg, var(--harbor), var(--harbor-dark)); color:#fff; box-shadow:0 3px 10px rgba(232,130,28,.35);}
  .btn-delete{background:#fff; color:var(--terracotta); border:1px solid var(--terracotta);}

  .roadmap-note{
    background:var(--paper-2); border-radius:14px;
    padding:13px 14px 13px 18px; font-size:12.5px; color:var(--ash); line-height:1.5; margin-top:6px;
    position:relative;
  }
  .roadmap-note::before{
    content:""; position:absolute; left:6px; top:10px; bottom:10px; width:4px;
    background:var(--harbor); border-radius:4px;
  }
  .roadmap-note b{color:var(--ink);}

  .copy-numbers-btn{
    display:block; width:100%; margin-bottom:14px; padding:11px; border-radius:24px;
    border:1px solid var(--harbor); background:#fff; color:var(--harbor-dark);
    font-family:'Inter'; font-weight:700; font-size:13px; cursor:pointer;
  }
  .copy-numbers-btn:active{background:var(--paper-2);}

  .wa-btn{
    display:block; text-align:center; text-decoration:none;
    background:#25D366; color:#fff; font-family:'Inter'; font-weight:700; font-size:13px;
    padding:10px; border-radius:24px; margin:-6px 0 14px;
  }
  .wa-btn:active{filter:brightness(.95);}

  .quick-actions{display:flex; gap:8px; margin:14px 0 4px;}
  .qa-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
    text-decoration:none; padding:10px 2px 9px; border-radius:14px; background:var(--paper-2);
  }
  .qa-btn:active{background:var(--line);}
  .qa-btn .qa-icon{
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  }
  .qa-btn span:last-child{font-family:'Inter'; font-size:10px; font-weight:700; color:var(--ink);}
  .qa-call .qa-icon{background:var(--harbor);}
  .qa-sms .qa-icon{background:var(--steel);}
  .qa-wa .qa-icon{background:#25D366;}
  .qa-mail .qa-icon{background:var(--plum);}
  .qa-disabled{opacity:.4; pointer-events:none;}
  .qa-disabled .qa-icon{background:var(--ash) !important;}
  .qa-btn{border:none; font-family:inherit; cursor:pointer;}
  .qa-add .qa-icon{background:var(--ash); position:relative;}
  .qa-add span:last-child{color:var(--ash);}
  .qa-plus{
    position:absolute; top:-3px; right:-3px; width:15px; height:15px; border-radius:50%;
    background:var(--harbor); color:#fff; font-size:11px; font-weight:800; line-height:15px;
    display:flex; align-items:center; justify-content:center; border:2px solid var(--paper);
  }

  /* ---------- Print ---------- */
  #printArea{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{display:block; position:absolute; left:0; top:0; width:100%; padding:14mm;}
    .print-fiche{
      border:1px solid #999; border-radius:8px; padding:14px 16px; margin-bottom:14px;
      page-break-inside:avoid; font-family:'Inter',sans-serif;
    }
    .print-fiche h3{font-family:'Inter',sans-serif; font-weight:700; font-size:17px; margin:0 0 4px;}
    .print-fiche .ptag{display:inline-block; font-size:10px; font-family:'IBM Plex Mono',monospace; padding:2px 8px; border-radius:10px; color:#fff; margin-bottom:6px;}
    .print-fiche .paddr{font-size:12.5px; color:#555; margin-bottom:8px;}
    .print-fiche .pline{font-size:12.5px; margin:2px 0;}
    .print-fiche .plabel{font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; color:#888;}
  }
</style>
</head>
<body>

<header>
  <div class="row">
    <div class="header-id">
      <div class="avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l1.2-5h15.6L21 9"/><path d="M3 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0"/><path d="M4.5 9.5V20h15V9.5"/><path d="M9.5 20v-5.5h5V20"/>
        </svg>
      </div>
      <div>
        <h1>Fiches Commerçants</h1>
        <div class="sub">Bandol · Répertoire commerçants</div>
      </div>
    </div>
    <span class="count-badge" id="countBadge">0</span>
  </div>
  <button class="icon-btn" id="printAllBtn">🖨 Tout imprimer</button>
</header>

<div class="controls">
  <div class="segmented">
    <button id="tabRue">Par rue</button>
    <button id="tabActivite" class="active">Par activité</button>
  </div>
  <div class="searchwrap">
    <input type="text" id="search" placeholder="Rechercher un commerçant, une rue, une activité…">
  </div>
</div>

<main id="listArea"></main>

<button class="fab" id="addBtn" title="Ajouter un commerçant">+</button>

<!-- Group overlay (commerçants d'une catégorie/rue) -->
<div class="overlay" id="groupOverlay">
  <div class="overlay-head">
    <button class="back" id="groupBack">←</button>
    <div class="htitle" id="groupHeadTitle">Groupe</div>
  </div>
  <div class="overlay-body" id="groupBody"></div>
</div>

<!-- Fiche overlay -->
<div class="overlay" id="ficheOverlay">
  <div class="overlay-head">
    <button class="back" id="ficheBack">←</button>
    <div class="htitle" id="ficheHeadTitle">Fiche</div>
  </div>
  <div class="overlay-body" id="ficheBody"></div>
</div>

<!-- Add overlay -->
<div class="overlay" id="addOverlay">
  <div class="overlay-head">
    <button class="back" id="addBack">←</button>
    <div class="htitle">Nouveau commerçant</div>
  </div>
  <div class="overlay-body">
    <div class="field"><label>Nom</label><input id="newNom" type="text" placeholder="Ex. Boulangerie du Port"></div>
    <div class="field"><label>Adresse</label><input id="newAdresse" type="text" placeholder="Ex. 12 Quai Charles de Gaulle"></div>
    <div class="field"><label>Activité</label><input id="newActivite" type="text" placeholder="Ex. Mode / prêt-à-porter" list="activitesList"></div>
    <datalist id="activitesList"></datalist>
    <div class="field"><label>Téléphone</label><input id="newTel" type="tel" placeholder="04 94 …"></div>
    <div class="field"><label>Email</label><input id="newEmail" type="email" placeholder="contact@…"></div>
    <button class="btn btn-print" id="saveNewBtn" style="width:100%;">Ajouter la fiche</button>
  </div>
</div>

<div id="printArea"></div>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "bhsh_fiches_commercants_v4";
  const PALETTE = ["#E8821C","#B5651D","#8B5E3C","#C9971C","#A85C2E","#9C5230"];

  const ICON_SHAPES = {
    "Alimentation / supermarchés": '<circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/><path d="M2.5 2.5h2.4l2.6 12.6a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L21 8H6.5"/>',
    "Vins / épicerie fine": '<path d="M5 3h14l-7 8z"/><line x1="12" y1="11" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/>',
    "Mode / prêt-à-porter": '<circle cx="12" cy="4.5" r="1.3"/><path d="M12 5.8v2.4"/><path d="M12 8.2 3.5 15a2 2 0 0 0 1 3.7h15a2 2 0 0 0 1-3.7L12 8.2z"/>',
    "Chaussures": '<path d="M3 17.5v-2.7c0-.9.6-1.7 1.5-2L9 11.3l3.3-3.3 1.8 1.8-1.6 1.6 2.6.9c2.1.7 4.3 1.1 6.4 1.4v3.8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><line x1="3" y1="14.8" x2="21" y2="14.8"/>',
    "Restaurants": '<line x1="6" y1="2" x2="6" y2="9"/><line x1="9" y1="2" x2="9" y2="9"/><line x1="7.5" y1="2" x2="7.5" y2="22"/><path d="M17 2c2 .3 3 2.2 3 4.2 0 2-1 3.6-3 3.9V22"/>'
  };
  const FALLBACK_SHAPES = [
    '<path d="M3 9l1.2-5h15.6L21 9"/><path d="M3 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0"/><path d="M4.5 9.5V20h15V9.5"/><path d="M9.5 20v-5.5h5V20"/>',
    '<path d="M12 2 3 11a2 2 0 0 0 0 2.8l7.2 7.2a2 2 0 0 0 2.8 0L21 12.8V4a2 2 0 0 0-2-2z"/><circle cx="16.3" cy="7.7" r="1.3"/>',
    '<path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/><line x1="12" y1="13" x2="12" y2="22"/>',
    '<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.8 2.8-2-2z"/>',
    '<circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><line x1="20" y1="4" x2="8.5" y2="15.5"/><line x1="14.5" y1="14.5" x2="20" y2="20"/><line x1="8.5" y1="8.5" x2="12" y2="12"/>'
  ];
  function shapeFor(activite){
    if(ICON_SHAPES[activite]) return ICON_SHAPES[activite];
    let h = 0;
    for(let i=0;i<activite.length;i++) h = (h + activite.charCodeAt(i)) % FALLBACK_SHAPES.length;
    return FALLBACK_SHAPES[h];
  }
  function iconFor(activite, size){
    size = size || 14;
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block; flex:0 0 auto;">${shapeFor(activite)}</svg>`;
  }
  const PIN_SHAPE = '<path d="M12 21.5s7-7.2 7-12.3A7 7 0 0 0 5 9.2C5 14.3 12 21.5 12 21.5z"/><circle cx="12" cy="9.2" r="2.4"/>';
  function pinIcon(size){
    size = size || 14;
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block; flex:0 0 auto;">${PIN_SHAPE}</svg>`;
  }

  function hashColor(str){
    let h = 0;
    for(let i=0;i<str.length;i++) h = (h + str.charCodeAt(i)) % PALETTE.length;
    return PALETTE[h];
  }

  function parseAdresse(str){
    const m = str.match(/^(\d+[a-zA-Z]?)\s+(.+)$/);
    if(m) return {numero:m[1], rue:m[2].trim()};
    return {numero:"", rue:str.trim()};
  }

  function genId(){
    return "c_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7);
  }

  function seedData(){
    const raw = [
      {nom:"Carrefour Express", adresse:"10 Rue des Écoles", activite:"Alimentation / supermarchés", telephone:"04 94 29 82 42", lat:43.1361696, lng:5.7526238},
      {nom:"Carrefour Market", adresse:"Quartier de la Garduère", activite:"Alimentation / supermarchés", telephone:"04 94 32 30 32", lat:43.1538, lng:5.7438},
      {nom:"Utile", adresse:"733 Bd de Pierreplane", activite:"Alimentation / supermarchés", telephone:"04 94 29 84 65", lat:43.140081, lng:5.7400373},
      {nom:"Picard (surgelés)", adresse:"290 Bd de Marseille", activite:"Alimentation / supermarchés", telephone:"04 94 25 46 03", lat:43.143539, lng:5.747969},
      {nom:"Œnothèque de Bandol", adresse:"Pl. Lucien Artaud", activite:"Vins / épicerie fine", telephone:"04 94 29 45 03", lat:43.1374319, lng:5.7603895},
      {nom:"Rendez Vous en Provence", adresse:"Pl. Lucien Artaud", activite:"Vins / épicerie fine", telephone:"04 94 07 54 77", lat:43.1374911, lng:5.7605069},
      {nom:"Atlantis", adresse:"47 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"04 94 25 05 30", lat:43.1367085, lng:5.7581097},
      {nom:"L'Insolente", adresse:"39 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"07 71 56 33 71", lat:43.1366406, lng:5.7578224},
      {nom:"Passage de la Mode", adresse:"65 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"04 94 32 29 73", lat:43.1369055, lng:5.7589166},
      {nom:"Influence", adresse:"29 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"04 94 71 39 92", lat:43.1366131, lng:5.7573164},
      {nom:"Comptoir du Sud", adresse:"71 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"04 94 32 39 45", lat:43.1369786, lng:5.759345},
      {nom:"WEEKEND", adresse:"39 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"04 94 29 98 34", lat:43.136637, lng:5.7577835},
      {nom:"Pain de Sucre", adresse:"65 Quai Charles de Gaulle", activite:"Mode / prêt-à-porter", telephone:"09 82 46 31 21", lat:43.1369055, lng:5.7589166},
      {nom:"K Concept Store", adresse:"23 Rue du Dr Louis Marçon", activite:"Mode / prêt-à-porter", telephone:"06 26 48 79 22", lat:43.1367175, lng:5.7571793},

      {nom:"Belati Bandol", adresse:"81 Quai Charles de Gaulle", activite:"Restaurants", telephone:"09 84 50 73 88", lat:43.1373174, lng:5.7600396},
      {nom:"La Caravelle Bandol", adresse:"43 Quai Charles de Gaulle", activite:"Restaurants", telephone:"04 94 29 54 19", lat:43.1366826, lng:5.758024},
      {nom:"Les 2 Pins", adresse:"37 Quai Charles de Gaulle", activite:"Restaurants", telephone:"04 94 29 72 49", lat:43.1366548, lng:5.7576423},
      {nom:"L'Alcôve", adresse:"5 Rue de la Paroisse", activite:"Restaurants", telephone:"04 94 74 85 77", lat:43.1365682, lng:5.7549963},
      {nom:"L'Envie", adresse:"75 Quai Charles de Gaulle", activite:"Restaurants", telephone:"07 49 72 40 98", lat:43.1370827, lng:5.7595834},
      {nom:"Qéya", adresse:"5 Rue du Dr Louis Marçon", activite:"Restaurants", telephone:"04 94 33 12 06", lat:43.1364881, lng:5.7560784},
      {nom:"Mammò : L'esprit du Tonnelier", adresse:"19 Rue des Tonneliers", activite:"Restaurants", telephone:"04 89 79 48 48", lat:43.1364466, lng:5.7541237},
      {nom:"La Table de Romain", adresse:"1 Rue du Dr Félicien Fabre", activite:"Restaurants", telephone:"04 94 88 94 79", lat:43.1355382, lng:5.7530939},
      {nom:"Le Shardana", adresse:"16 Rue de la République", activite:"Restaurants", telephone:"04 94 32 17 79", lat:43.1361092, lng:5.7541851},
      {nom:"La Table Provençale - Chez Michel", adresse:"177 Av. de la Gare", activite:"Restaurants", telephone:"04 94 29 41 40", lat:43.1396394, lng:5.7517328}
    ];
    return raw.map(r=>{
      const {numero, rue} = parseAdresse(r.adresse);
      return {
        id:genId(), nom:r.nom, adresse:r.adresse, ville:"Bandol",
        numero, rue, activite:r.activite,
        telephone:r.telephone||"", email:"", siret:"", notes:"", evenements:"",
        lat:r.lat||null, lng:r.lng||null,
        ca:[]
      };
    });
  }

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    const seeded = seedData();
    saveData(seeded);
    return seeded;
  }

  function saveData(data){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let DATA = loadData();
  let viewMode = "activite"; // 'rue' | 'activite'
  let searchQuery = "";
  let currentFicheId = null;

  // ---------- Rendering ----------
  function matchesSearch(c, q){
    if(!q) return true;
    q = q.toLowerCase();
    return c.nom.toLowerCase().includes(q) ||
           c.rue.toLowerCase().includes(q) ||
           c.activite.toLowerCase().includes(q) ||
           c.adresse.toLowerCase().includes(q);
  }

  function groupBy(key){
    const groups = {};
    DATA.filter(c=>matchesSearch(c, searchQuery)).forEach(c=>{
      const k = c[key] || "—";
      if(!groups[k]) groups[k] = [];
      groups[k].push(c);
    });
    return groups;
  }

  const ACTIVITE_ORDER = [
    "Alimentation / supermarchés",
    "Restaurants",
    "Vins / épicerie fine",
    "Mode / prêt-à-porter",
    "Chaussures"
  ];
  function sortGroupKeys(keys, key){
    if(key === "activite"){
      return keys.slice().sort((a,b)=>{
        const ia = ACTIVITE_ORDER.indexOf(a), ib = ACTIVITE_ORDER.indexOf(b);
        if(ia===-1 && ib===-1) return a.localeCompare(b,'fr');
        if(ia===-1) return 1;
        if(ib===-1) return -1;
        return ia-ib;
      });
    }
    return keys.slice().sort((a,b)=>a.localeCompare(b,'fr'));
  }

  function shade(hex, percent){
    const num = parseInt(hex.slice(1),16);
    let r = (num>>16) + Math.round(2.55*percent);
    let g = ((num>>8)&0xff) + Math.round(2.55*percent);
    let b = (num&0xff) + Math.round(2.55*percent);
    r = Math.max(Math.min(255,r),0); g = Math.max(Math.min(255,g),0); b = Math.max(Math.min(255,b),0);
    return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }

  function commerceTileHtml(c, subLineMode){
    const color = hashColor(c.activite);
    const c2 = shade(color, -16);
    const icon = iconFor(c.activite, 24);
    const subLine = subLineMode === "rue" ? c.activite : c.adresse;
    return `<button class="tile" data-id="${c.id}" style="background:linear-gradient(165deg, ${color}, ${c2});">
      <span class="tile-icon">${icon}</span>
      <span class="tile-label">${escapeHtml(c.nom)}</span>
      <span class="tile-sub">${escapeHtml(subLine)}</span>
    </button>`;
  }

  function groupTileHtml(k, items, mode){
    const color = hashColor(k);
    const c2 = shade(color, -16);
    const icon = mode === "activite" ? iconFor(k, 28) : pinIcon(28);
    return `<button class="tile group-tile" data-key="${escapeAttr(k)}" style="background:linear-gradient(165deg, ${color}, ${c2});">
      <span class="tile-count">${items.length}</span>
      <span class="tile-icon">${icon}</span>
      <span class="tile-label">${escapeHtml(k)}</span>
    </button>`;
  }

  function render(){
    document.getElementById("countBadge").textContent = DATA.length + (DATA.length>1 ? " fiches" : " fiche");
    const listArea = document.getElementById("listArea");

    if(searchQuery){
      const items = DATA.filter(c=>matchesSearch(c, searchQuery)).sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
      if(items.length === 0){
        listArea.innerHTML = '<div class="empty"><div class="big">🔍</div>Aucun commerçant ne correspond à la recherche.</div>';
        return;
      }
      listArea.innerHTML = `<div class="tile-grid" style="margin-top:6px;">${items.map(c=>commerceTileHtml(c, viewMode)).join("")}</div>`;
      return;
    }

    const key = viewMode === "rue" ? "rue" : "activite";
    const groups = groupBy(key);
    const keys = sortGroupKeys(Object.keys(groups), key);

    if(keys.length === 0){
      listArea.innerHTML = '<div class="empty"><div class="big">🔍</div>Aucun commerçant.</div>';
      return;
    }

    listArea.innerHTML = `<div class="tile-grid">${keys.map(k=>groupTileHtml(k, groups[k], viewMode)).join("")}</div>`;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(s){ return escapeHtml(s); }

  // ---------- WhatsApp ----------
  function waNumber(phone){
    let digits = String(phone||"").replace(/\D/g,"");
    if(!digits) return "";
    if(digits.startsWith("0")) digits = "33" + digits.slice(1);
    return digits;
  }
  function waLink(phone){
    const num = waNumber(phone);
    return num ? `https://wa.me/${num}` : "";
  }
  function cleanPhone(phone){
    return String(phone||"").replace(/\s+/g,"");
  }
  function flashCopyBtn(btn){
    const original = btn.textContent;
    btn.textContent = "✓ Copié";
    setTimeout(()=>{ btn.textContent = original; }, 1600);
  }
  function copyGroupNumbers(key, btn){
    const groupKey = viewMode === "rue" ? "rue" : "activite";
    const items = DATA.filter(c=>matchesSearch(c, searchQuery) && (c[groupKey]||"—") === key && c.telephone)
      .sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
    if(items.length === 0){ alert("Aucun numéro de téléphone dans ce groupe pour l'instant."); return; }
    const text = items.map(c=>`${c.nom} : ${c.telephone}`).join("\n");
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>flashCopyBtn(btn)).catch(()=>alert(text));
    } else {
      alert(text);
    }
  }

  // ---------- Quick actions (Appeler / SMS / WhatsApp / Email) ----------
  const QA_SHAPES = {
    call: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',
    sms: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
    mail: '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/>'
  };
  function qaIcon(shapeKey){
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${QA_SHAPES[shapeKey]}</svg>`;
  }
  function quickActionsHtml(c){
    const tel = c.telephone ? cleanPhone(c.telephone) : "";
    const mail = c.email ? c.email.trim() : "";
    function btn(cls, type, icon, label, hasValue){
      const addCls = hasValue ? "" : " qa-add";
      const plus = hasValue ? "" : '<span class="qa-plus">+</span>';
      return `<button type="button" class="qa-btn ${cls}${addCls}" data-type="${type}">
        <span class="qa-icon">${icon}${plus}</span>
        <span>${label}</span>
      </button>`;
    }
    return `<div class="quick-actions">
      ${btn("qa-call", "call", qaIcon("call"), "Appeler", !!tel)}
      ${btn("qa-sms", "sms", qaIcon("sms"), "SMS", !!tel)}
      ${btn("qa-wa", "wa", qaIcon("sms"), "WhatsApp", !!tel)}
      ${btn("qa-mail", "mail", qaIcon("mail"), "Email", !!mail)}
    </div>`;
  }

  // ---------- Group overlay ----------
  let currentGroupKey = null;
  function openGroup(key){
    currentGroupKey = key;
    const groupKey = viewMode === "rue" ? "rue" : "activite";
    const items = DATA.filter(c=>matchesSearch(c, searchQuery) && (c[groupKey]||"—") === key)
      .sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
    document.getElementById("groupHeadTitle").textContent = key;
    document.getElementById("groupBody").innerHTML = `
      <button class="copy-numbers-btn" id="copyNumbersBtn">📋 Copier les numéros du groupe</button>
      <div class="tile-grid">${items.map(c=>commerceTileHtml(c, viewMode)).join("")}</div>
    `;
    document.getElementById("copyNumbersBtn").addEventListener("click", (e)=> copyGroupNumbers(key, e.currentTarget));
    document.getElementById("groupOverlay").classList.add("open");
  }
  function closeGroup(){
    currentGroupKey = null;
    document.getElementById("groupOverlay").classList.remove("open");
  }

  // ---------- Fiche overlay ----------
  function openFiche(id){
    currentFicheId = id;
    const c = DATA.find(x=>x.id===id);
    if(!c) return;
    const color = hashColor(c.activite);
    document.getElementById("ficheHeadTitle").textContent = c.nom;
    document.getElementById("ficheBody").innerHTML = `
      <div class="fiche-card" style="--tagcolor:${color}">
        <div class="fiche-nom serif">${escapeHtml(c.nom)}</div>
        <span class="fiche-tag" style="background:${color}">${iconFor(c.activite,12)} ${escapeHtml(c.activite)}</span>
        <div class="fiche-addr">${escapeHtml(c.adresse)}, ${escapeHtml(c.ville)}</div>

        ${quickActionsHtml(c)}

        <div class="perf"></div>

        <div class="field"><label>Téléphone</label><input type="tel" id="f_tel" value="${escapeAttr(c.telephone)}" placeholder="04 94 …"></div>
        <div class="field"><label>Email</label><input type="email" id="f_email" value="${escapeAttr(c.email)}" placeholder="contact@…"></div>
        <div class="field"><label>SIRET (optionnel)</label><input type="text" id="f_siret" value="${escapeAttr(c.siret)}" placeholder="123 456 789 00012"></div>
        <div class="field"><label>Notes</label><textarea id="f_notes" placeholder="Horaires, contact référent, remarques…">${escapeHtml(c.notes)}</textarea></div>

        <div class="perf"></div>

        <div class="field" style="margin-bottom:6px;">
          <label>Chiffre d'affaires par période</label>
          <table class="ca-table">
            <thead><tr><th>Mois</th><th>Montant (€)</th><th></th></tr></thead>
            <tbody id="caRows"></tbody>
          </table>
          <button class="add-ca-btn" id="addCaBtn">+ Ajouter une période</button>
        </div>

        <div class="field">
          <label>Événements municipaux &amp; impact observé</label>
          <textarea id="f_evt" placeholder="Ex. Marché nocturne juillet 2025 : CA +15% sur la quinzaine">${escapeHtml(c.evenements)}</textarea>
        </div>

        <div class="roadmap-note">
          <b>Prochaine étape :</b> une fois le CA par mois et les dates d'événements importés depuis ton fichier Excel, j'ajouterai une vue statistiques pour croiser automatiquement les deux et faire ressortir les événements qui ont le plus dopé le CA.
        </div>

        <div id="savedHint" class="saved-hint"></div>

        <div class="btn-row">
          <button class="btn btn-print" id="printOneBtn">🖨 Imprimer cette fiche</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-delete" id="deleteBtn">Supprimer cette fiche</button>
        </div>
      </div>
    `;
    renderCaRows(c);
    bindFicheFieldEvents(c);
    document.getElementById("ficheOverlay").classList.add("open");
  }

  function renderCaRows(c){
    const tbody = document.getElementById("caRows");
    if(!tbody) return;
    tbody.innerHTML = c.ca.map((row, i)=>`
      <tr class="ca-row" data-i="${i}">
        <td><input type="month" class="ca-period" value="${escapeAttr(row.periode||'')}"></td>
        <td><input type="number" class="ca-montant" value="${row.montant!=null?row.montant:''}" placeholder="0" step="0.01"></td>
        <td><button class="rm" data-i="${i}">✕</button></td>
      </tr>
    `).join("") || `<tr><td colspan="3" style="color:var(--ash); font-size:12.5px; padding:8px 4px;">Aucune donnée de CA pour l'instant.</td></tr>`;

    tbody.querySelectorAll(".ca-period, .ca-montant").forEach(inp=>{
      inp.addEventListener("change", ()=>{
        const i = inp.closest("tr").dataset.i;
        if(i === undefined) return;
        const row = c.ca[i];
        if(!row) return;
        const tr = inp.closest("tr");
        row.periode = tr.querySelector(".ca-period").value;
        const m = tr.querySelector(".ca-montant").value;
        row.montant = m === "" ? null : parseFloat(m);
        saveData(DATA);
        flashSaved();
      });
    });
    tbody.querySelectorAll(".rm").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const i = parseInt(btn.dataset.i,10);
        c.ca.splice(i,1);
        saveData(DATA);
        renderCaRows(c);
        flashSaved();
      });
    });
  }

  function flashSaved(){
    const hint = document.getElementById("savedHint");
    if(!hint) return;
    hint.textContent = "✓ Enregistré";
    setTimeout(()=>{ if(hint) hint.textContent = ""; }, 1500);
  }

  function focusField(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.scrollIntoView({behavior:"smooth", block:"center"});
    setTimeout(()=> el.focus(), 300);
  }

  function bindFicheFieldEvents(c){
    const map = {f_tel:"telephone", f_email:"email", f_siret:"siret", f_notes:"notes", f_evt:"evenements"};
    Object.keys(map).forEach(elId=>{
      const el = document.getElementById(elId);
      if(!el) return;
      el.addEventListener("change", ()=>{
        c[map[elId]] = el.value;
        saveData(DATA);
        if(elId === "f_tel" || elId === "f_email") openFiche(c.id);
        else flashSaved();
      });
    });
    const qaWrap = document.querySelector(".quick-actions");
    if(qaWrap){
      qaWrap.addEventListener("click", (e)=>{
        const btn = e.target.closest(".qa-btn");
        if(!btn) return;
        const type = btn.dataset.type;
        const tel = c.telephone ? cleanPhone(c.telephone) : "";
        const mail = c.email ? c.email.trim() : "";
        if(type === "call"){
          if(tel) window.location.href = `tel:${tel}`;
          else focusField("f_tel");
        } else if(type === "sms"){
          if(tel) window.location.href = `sms:${tel}`;
          else focusField("f_tel");
        } else if(type === "wa"){
          if(tel) window.open(waLink(c.telephone), "_blank", "noopener");
          else focusField("f_tel");
        } else if(type === "mail"){
          if(mail) window.location.href = `mailto:${mail}`;
          else focusField("f_email");
        }
      });
    }
    document.getElementById("addCaBtn").addEventListener("click", ()=>{
      c.ca.push({periode:"", montant:null});
      saveData(DATA);
      renderCaRows(c);
    });
    document.getElementById("printOneBtn").addEventListener("click", ()=> printFiches([c]));
    document.getElementById("deleteBtn").addEventListener("click", ()=>{
      if(confirm(`Supprimer la fiche "${c.nom}" ? Cette action est définitive.`)){
        DATA = DATA.filter(x=>x.id!==c.id);
        saveData(DATA);
        closeFiche();
        render();
        if(currentGroupKey) openGroup(currentGroupKey);
      }
    });
  }

  function closeFiche(){
    document.getElementById("ficheOverlay").classList.remove("open");
    currentFicheId = null;
  }

  // ---------- Print ----------
  function printFiches(list){
    const area = document.getElementById("printArea");
    area.innerHTML = list.map(c=>{
      const color = hashColor(c.activite);
      const caRows = (c.ca||[]).filter(r=>r.periode || r.montant!=null);
      const caHtml = caRows.length ? `
        <div class="pline"><span class="plabel">Chiffre d'affaires</span></div>
        ${caRows.map(r=>`<div class="pline">${escapeHtml(r.periode||'—')} : ${r.montant!=null ? r.montant.toLocaleString('fr-FR')+' €' : '—'}</div>`).join("")}
      ` : "";
      return `<div class="print-fiche">
        <h3>${escapeHtml(c.nom)}</h3>
        <span class="ptag" style="background:${color}">${escapeHtml(c.activite)}</span>
        <div class="paddr">${escapeHtml(c.adresse)}, ${escapeHtml(c.ville)}</div>
        <div class="pline"><span class="plabel">Téléphone</span> ${c.telephone ? escapeHtml(c.telephone) : '—'}</div>
        <div class="pline"><span class="plabel">Email</span> ${c.email ? escapeHtml(c.email) : '—'}</div>
        ${c.notes ? `<div class="pline"><span class="plabel">Notes</span> ${escapeHtml(c.notes)}</div>` : ""}
        ${c.evenements ? `<div class="pline"><span class="plabel">Événements</span> ${escapeHtml(c.evenements)}</div>` : ""}
        ${caHtml}
      </div>`;
    }).join("");
    window.print();
  }

  // ---------- Add ----------
  function openAdd(){
    document.getElementById("newNom").value = "";
    document.getElementById("newAdresse").value = "";
    document.getElementById("newActivite").value = "";
    document.getElementById("newTel").value = "";
    document.getElementById("newEmail").value = "";
    const dl = document.getElementById("activitesList");
    const acts = [...new Set(DATA.map(c=>c.activite))];
    dl.innerHTML = acts.map(a=>`<option value="${escapeAttr(a)}">`).join("");
    document.getElementById("addOverlay").classList.add("open");
  }
  function closeAdd(){ document.getElementById("addOverlay").classList.remove("open"); }

  function saveNew(){
    const nom = document.getElementById("newNom").value.trim();
    const adresse = document.getElementById("newAdresse").value.trim();
    const activite = document.getElementById("newActivite").value.trim() || "Non classé";
    const telephone = document.getElementById("newTel").value.trim();
    const email = document.getElementById("newEmail").value.trim();
    if(!nom || !adresse){
      alert("Le nom et l'adresse sont nécessaires pour créer la fiche.");
      return;
    }
    const {numero, rue} = parseAdresse(adresse);
    DATA.push({
      id:genId(), nom, adresse, ville:"Bandol", numero, rue, activite,
      telephone, email, siret:"", notes:"", evenements:"", ca:[]
    });
    saveData(DATA);
    closeAdd();
    render();
  }

  // ---------- Events ----------
  document.getElementById("tabRue").addEventListener("click", ()=>{
    viewMode = "rue";
    document.getElementById("tabRue").classList.add("active");
    document.getElementById("tabActivite").classList.remove("active");
    render();
  });
  document.getElementById("tabActivite").addEventListener("click", ()=>{
    viewMode = "activite";
    document.getElementById("tabActivite").classList.add("active");
    document.getElementById("tabRue").classList.remove("active");
    render();
  });
  document.getElementById("search").addEventListener("input", (e)=>{
    searchQuery = e.target.value;
    render();
  });
  document.getElementById("listArea").addEventListener("click", (e)=>{
    const tile = e.target.closest(".tile");
    if(!tile) return;
    if(tile.dataset.key) openGroup(tile.dataset.key);
    else if(tile.dataset.id) openFiche(tile.dataset.id);
  });
  document.getElementById("groupBody").addEventListener("click", (e)=>{
    const tile = e.target.closest(".tile");
    if(tile && tile.dataset.id) openFiche(tile.dataset.id);
  });
  document.getElementById("groupBack").addEventListener("click", closeGroup);
  document.getElementById("addBtn").addEventListener("click", openAdd);
  document.getElementById("addBack").addEventListener("click", closeAdd);
  document.getElementById("saveNewBtn").addEventListener("click", saveNew);
  document.getElementById("ficheBack").addEventListener("click", closeFiche);
  document.getElementById("printAllBtn").addEventListener("click", ()=> printFiches(DATA));

  render();
})();
</script>
</body>
</html>
